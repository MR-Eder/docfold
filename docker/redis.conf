# Redis configuration for docfold job queue
#
# Optimized for job queue workload:
# - Persistence for job state durability
# - Bounded memory with eviction for volatile keys
# - TCP keepalive for container networking

# -- Networking --
bind 0.0.0.0
port 6379
tcp-keepalive 300
timeout 0

# -- Memory --
maxmemory 256mb
maxmemory-policy allkeys-lru

# -- Persistence (RDB snapshots) --
# Save if at least 1 key changed in 900s, 10 keys in 300s, or 10000 keys in 60s
save 900 1
save 300 10
save 60 10000

dbfilename dump.rdb
dir /data

# -- Append Only File (for durability) --
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# -- Logging --
loglevel notice

# -- Limits --
maxclients 1000
