apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "docfold.fullname" . }}-config
  labels:
    {{- include "docfold.labels" . | nindent 4 }}
data:
  DOCFOLD_UPLOAD_DIR: {{ .Values.config.uploadDir | quote }}
  DOCFOLD_RESULTS_DIR: {{ .Values.config.resultsDir | quote }}
  DOCFOLD_MAX_UPLOAD_SIZE_MB: {{ .Values.config.maxUploadSizeMb | quote }}
  DOCFOLD_RESULT_TTL_HOURS: {{ .Values.config.resultTtlHours | quote }}
  DOCFOLD_CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
